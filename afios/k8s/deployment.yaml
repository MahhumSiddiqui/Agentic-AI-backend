apiVersion: apps/v1
kind: Deployment
metadata:
  name: afios-api
  labels:
    app: afios-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: afios-api
  template:
    metadata:
      labels:
        app: afios-api
    spec:
      containers:
      - name: afios-api
        image: afios-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: POSTGRES_SERVER
          value: "afios-db.internal"
        - name: REDIS_URL
          value: "redis://afios-redis.internal:6379/0"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka.internal:9092"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
