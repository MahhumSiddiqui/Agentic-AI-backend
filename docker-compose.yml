services:
  postgres:
    image: postgres:15
    container_name: afios-postgres
    environment:
      POSTGRES_USER: afios
      POSTGRES_PASSWORD: afios_pass
      POSTGRES_DB: afios_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: afios-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  afios-api:
    build:
      context: .
      dockerfile: afios/docker/Dockerfile
    container_name: afios-api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_SERVER: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
